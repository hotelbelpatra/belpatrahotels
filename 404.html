<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page Not Found — Belpatra, Orchha</title>
<link rel="icon" type="image/png" href="uploads/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" media="print" onload="this.media='all'"><noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"></noscript>
<script>(function(){var t=localStorage.getItem('belpatraTheme')||'dark';document.documentElement.setAttribute('data-theme',t);})()</script>
<style>
  :root{--bg-1:#0c1a11;--bg-2:#162a1c;--bg-3:#1d3525;--tx-1:#f2ead8;--tx-2:#c9b896;--tx-m:#b09878;--gr:#4fa870;--gd:#d4a843;--sf:#e07828;--bd:rgba(79,168,112,0.18);}
  [data-theme="light"]{--bg-1:#f5f0e8;--bg-2:#ece5d7;--bg-3:#ffffff;--tx-1:#1a3020;--tx-2:#3d5c42;--tx-m:#4f614a;--gr:#2d6a45;--gd:#b8902a;--sf:#c0621a;--bd:rgba(45,106,69,0.15);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg-1);color:var(--tx-1);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;position:relative;overflow:hidden;}
  a{color:inherit;text-decoration:none;}
  h1,h2,h3{font-family:'Cormorant Garamond',serif;}
  @keyframes drift{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-20px) rotate(4deg)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
  @keyframes aurora1{0%{transform:translate(0,0) scale(1)}100%{transform:translate(8%,10%) scale(1.2)}}
  @keyframes aurora2{0%{transform:translate(0,0) scale(1)}100%{transform:translate(-8%,8%) scale(1.18)}}
  .aura1{position:absolute;left:-10%;top:10%;width:60%;height:300px;background:radial-gradient(ellipse,rgba(79,168,112,0.18) 0%,transparent 70%);border-radius:50%;filter:blur(50px);animation:aurora1 10s ease-in-out infinite alternate;pointer-events:none;}
  .aura2{position:absolute;right:-5%;bottom:10%;width:50%;height:260px;background:radial-gradient(ellipse,rgba(212,168,67,0.10) 0%,transparent 70%);border-radius:50%;filter:blur(60px);animation:aurora2 12s ease-in-out infinite alternate;pointer-events:none;}
  .leaf{font-size:96px;animation:drift 5s ease-in-out infinite;display:block;margin-bottom:24px;}
  .code{font-family:'Cormorant Garamond',serif;font-size:clamp(80px,15vw,140px);font-weight:600;color:var(--gr);line-height:1;opacity:0.22;position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);pointer-events:none;user-select:none;}
  .content{position:relative;z-index:1;animation:fadeUp 0.7s ease both;}
  .tag{display:inline-flex;align-items:center;gap:6px;background:rgba(79,168,112,0.1);border:1px solid rgba(79,168,112,0.25);border-radius:20px;padding:5px 14px;font-size:11px;font-weight:600;letter-spacing:0.12em;color:var(--gr);margin-bottom:28px;}
  h1{font-size:clamp(28px,5vw,42px);font-weight:600;color:var(--tx-1);margin-bottom:12px;line-height:1.2;}
  p{color:var(--tx-2);font-size:15px;line-height:1.75;max-width:420px;margin:0 auto 36px;}
  .btns{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;}
  .btn-p{background:var(--gd);color:#1a1000;padding:13px 28px;border-radius:5px;font-size:13px;font-weight:700;letter-spacing:0.06em;transition:opacity 0.2s;}
  .btn-p:hover{opacity:0.88;}
  .btn-s{border:1px solid var(--bd);color:var(--tx-2);padding:13px 28px;border-radius:5px;font-size:13px;font-weight:500;transition:border-color 0.2s,color 0.2s;}
  .btn-s:hover{border-color:var(--gr);color:var(--gr);}
  .links{margin-top:44px;display:flex;flex-wrap:wrap;gap:8px 20px;justify-content:center;}
  .links a{color:var(--tx-m);font-size:12.5px;border-bottom:1px solid transparent;transition:color 0.2s,border-color 0.2s;}
  .links a:hover{color:var(--gd);border-bottom-color:var(--gd);}
  .divider{color:var(--bd);}
</style>
</head>
<body>
<div class="aura1"></div>
<div class="aura2"></div>
<div class="code">404</div>

<div class="content">
  <span class="leaf">🌿</span>
  <div class="tag">🌿 PAGE NOT FOUND</div>
  <h1>Lost on the way to Orchha?</h1>
  <p>The page you're looking for has wandered off like a pilgrim in the forest. Let us guide you back to Belpatra.</p>
  <div class="btns">
    <a href="/" class="btn-p">🏠 Back to Home</a>
    <a href="/contact" class="btn-s">📞 Contact Us</a>
  </div>
  <nav class="links">

    <span class="divider">·</span>
    <a href="/restaurant">Restaurant</a>
    <span class="divider">·</span>

    <span class="divider">·</span>
    <a href="/blog">Blog</a>
    <span class="divider">·</span>
    <a href="/attractions">Attractions</a>
  </nav>
</div>
</body>
</html>
